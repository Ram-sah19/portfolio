<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Message Sent — Rambilas Sah</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: #0d0f14;
      color: #ddd8cc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(200,180,120,.15);
      border-radius: 24px;
      padding: 60px 48px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 25px 60px rgba(0,0,0,.6), 0 0 40px rgba(201,168,76,.1);
    }
    .icon { font-size: 3.5rem; margin-bottom: 24px; }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #f5f0e8;
      margin-bottom: 12px;
    }
    p {
      color: #8a8478;
      font-size: 1rem;
      line-height: 1.7;
      margin-bottom: 36px;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 50px;
      background: linear-gradient(135deg, #8b6914, #c9a84c);
      color: #0d0f14;
      font-weight: 600;
      text-decoration: none;
      font-size: .95rem;
      transition: transform .3s, box-shadow .3s;
    }
    a:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 40px rgba(201,168,76,.4);
    }
    .mono {
      font-family: 'Space Mono', monospace;
      font-size: .75rem;
      color: #c9a84c;
      letter-spacing: .12em;
      text-transform: uppercase;
      display: block;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <span class="mono">Message Received</span>
    <h1>Thanks for reaching out!</h1>
    <p>I've received your message and will get back to you as soon as possible — usually within 24 hours.</p>
    <a href="/">← Back to Portfolio</a>
  </div>
</body>
</html>
